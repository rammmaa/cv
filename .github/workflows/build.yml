name: Build CV PDF

on:
  push:
    branches: [main]
    paths: ['cv.tex']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          compiler: pdflatex

      - name: Commit PDF
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add cv.pdf
          git diff --cached --quiet || git commit -m "Build cv.pdf"
          git push
